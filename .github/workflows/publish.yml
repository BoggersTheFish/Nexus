name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*.*.*'      # v1.11.0, v1.12.0-rc1, etc.
  workflow_dispatch:  # allow manual publishes from the Actions tab

permissions:
  contents: read
  packages: write     # required for maven.pkg.github.com push

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Cache by gradle wrapper version + lockfiles
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Verify tag matches root version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PROJECT_VERSION=$(grep -E '^version = "[0-9]' build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$TAG" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag '$TAG' does not match project version '$PROJECT_VERSION'."
            echo "Bump build.gradle.kts version or retag."
            exit 1
          fi
          echo "Tag $TAG matches project version. Publishing."

      - name: Run tests (gate)
        run: ./gradlew --no-daemon --no-configuration-cache test

      - name: Publish all modules
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Skips the root :publish if it fails to resolve the Hytale API
        # (the hytale Maven repo is sometimes unreachable from CI).
        # Sub-modules still publish — they don't depend on the Hytale jar.
        run: |
          ./gradlew --no-daemon --no-configuration-cache \
            :nexus-core:publish \
            :nexus-paper:publish \
            :nexus-resources:publish \
            :nexus-i18n:publish \
            :nexus-persistence:publish \
            :nexus-scheduler:publish \
            :nexus-paper-loader:publish \
            :nexus-paper-gui:publish \
            :nexus-paper-bedrock:publish \
            :nexus-paper-listeners:publish \
            :nexus-vault:publish \
            :nexus-papi:publish

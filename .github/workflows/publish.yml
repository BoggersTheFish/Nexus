name: CI / Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write     # required for maven.pkg.github.com push

jobs:
  ci:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - name: Build and test all modules
        run: ./gradlew build --no-daemon --no-configuration-cache
      - name: Run detekt
        run: ./gradlew detekt --no-daemon --no-configuration-cache
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: '**/build/reports/detekt/'
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/kotlin
            p/java
            p/secrets
        continue-on-error: true
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        # Advisory-only, consistent with Semgrep above: report findings without
        # failing the check. Drop continue-on-error and add exit-code: '1' to gate.
        continue-on-error: true

  publish:
    runs-on: ubuntu-latest
    needs: ci
    # always() forces this gate to evaluate even though `ci` is skipped on tag
    # pushes (its own `if` excludes tags). Without it, a skipped dependency
    # would cascade-skip `publish` and no release would ever be cut.
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.ci.result != 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Cache by gradle wrapper version + lockfiles
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Verify tag matches root version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PROJECT_VERSION=$(grep -E '^version = "[0-9]' build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$TAG" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag '$TAG' does not match project version '$PROJECT_VERSION'."
            echo "Bump build.gradle.kts version or retag."
            exit 1
          fi
          echo "Tag $TAG matches project version. Publishing."

      - name: Run tests (gate)
        run: ./gradlew build --no-daemon --no-configuration-cache

      - name: Publish all modules
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew --no-daemon --no-configuration-cache \
            :nexus-core:publish \
            :nexus-paper:publish \
            :nexus-resources:publish \
            :nexus-i18n:publish \
            :nexus-persistence:publish \
            :nexus-scheduler:publish \
            :nexus-paper-loader:publish \
            :nexus-paper-gui:publish \
            :nexus-paper-bedrock:publish \
            :nexus-paper-listeners:publish \
            :nexus-vault:publish \
            :nexus-papi:publish \
            :nexus-permissions:publish \
            :nexus-permissions-gradle:publish \
            :nexus-worldedit:publish

      - name: Publish permissions plugin to Gradle Plugin Portal
        # No-ops until the GRADLE_PUBLISH_KEY/SECRET repo secrets are set,
        # so the release pipeline never fails for lack of Portal creds.
        # Portal versions are immutable — re-tagging an already-published
        # version 409s, same as GHP, hence the new release version each time.
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        if: env.GRADLE_PUBLISH_KEY != ''
        run: |
          ./gradlew --no-daemon --no-configuration-cache \
            :nexus-permissions-gradle:publishPlugins \
            -Pgradle.publish.key="$GRADLE_PUBLISH_KEY" \
            -Pgradle.publish.secret="$GRADLE_PUBLISH_SECRET"
